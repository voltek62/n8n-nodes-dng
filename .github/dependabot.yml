version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/nodes-dng"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "@types/*"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
