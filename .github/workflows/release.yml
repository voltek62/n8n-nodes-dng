name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest

    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nodes-dng/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: nodes-dng
        run: npm ci

      - name: Build
        working-directory: nodes-dng
        run: npm run build

      - name: Verify no answers leak before publishing
        run: |
          set -e
          if grep -RIlE 'ideal_workflow|grading_rubric|critical_criteria|required_nodes' nodes-dng/challenges/; then
            echo "::error::Reference solution / rubric leaked into the public challenges/ directory."
            exit 1
          fi

      - name: Publish to npm
        if: env.HAS_NPM_TOKEN == 'true'
        working-directory: nodes-dng
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish (no NPM_TOKEN secret configured)
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "::notice title=npm publish skipped::NPM_TOKEN secret is not set on this repository — skipping the npm publish step. The GitHub Release with the tarball will still be created."

      - name: Pack release tarball
        working-directory: nodes-dng
        run: npm pack

      - name: Attach tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nodes-dng/n8n-nodes-dng-*.tgz
